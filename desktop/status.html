<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Last Singularity — Stack Status</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050914;
      --panel: rgba(11, 18, 31, 0.92);
      --panel-border: rgba(255,255,255,0.14);
      --accent: #7dd3fc;
      --warn: #f59e0b;
      --ok: #34d399;
      --text: #e7ecff;
      --muted: rgba(231,236,255,0.68);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      --sans: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      margin: 0;
      padding: 16px;
      background: radial-gradient(circle at top, rgba(125,211,252,0.08), transparent 35%), var(--bg);
      color: var(--text);
      font: 13px/1.45 var(--sans);
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 12px;
    }
    .title { font-size: 16px; font-weight: 700; }
    .muted { color: var(--muted); }
    .button {
      appearance: none;
      border: 1px solid var(--panel-border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      font: inherit;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 10px 32px rgba(0,0,0,0.35);
    }
    .panel h2 {
      margin: 0 0 6px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .metric { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .ok { color: var(--ok); }
    .warn { color: var(--warn); }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font: 12px/1.45 var(--mono);
      color: var(--muted);
    }
    .wide { margin-top: 12px; }
    @media (max-width: 880px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="title">Embedded Stack Status</div>
      <div id="checkedAt" class="muted">Waiting for first snapshot…</div>
    </div>
    <button id="focusMain" class="button">Focus Game Window</button>
  </div>

  <div class="grid">
    <section class="panel">
      <h2>Control Plane</h2>
      <div id="controlMetric" class="metric">Checking…</div>
      <pre id="controlBody"></pre>
    </section>
    <section class="panel">
      <h2>Sim</h2>
      <div id="simMetric" class="metric">Checking…</div>
      <pre id="simBody"></pre>
    </section>
    <section class="panel">
      <h2>Session</h2>
      <div id="sessionMetric" class="metric">Checking…</div>
      <pre id="sessionBody"></pre>
    </section>
  </div>

  <section class="panel wide">
    <h2>Raw Status</h2>
    <pre id="rawBody"></pre>
  </section>

  <script>
    const checkedAt = document.getElementById('checkedAt');
    const controlMetric = document.getElementById('controlMetric');
    const controlBody = document.getElementById('controlBody');
    const simMetric = document.getElementById('simMetric');
    const simBody = document.getElementById('simBody');
    const sessionMetric = document.getElementById('sessionMetric');
    const sessionBody = document.getElementById('sessionBody');
    const rawBody = document.getElementById('rawBody');
    document.getElementById('focusMain').addEventListener('click', () => window.lbhStatus.openMainWindow());

    function metricState(ok) {
      return ok ? 'metric ok' : 'metric warn';
    }

    function render(snapshot) {
      checkedAt.textContent = `Checked ${new Date(snapshot.checkedAt).toLocaleTimeString()}`;
      const controlHealth = snapshot.services.control.health;
      const simHealth = snapshot.services.sim.health;
      controlMetric.className = metricState(Boolean(controlHealth));
      controlMetric.textContent = controlHealth ? `Healthy · ${controlHealth.profileCount} profiles · ${controlHealth.sessionCount} sessions` : 'Offline';
      controlBody.textContent = snapshot.services.control.statusText || 'No control-plane wrapper status available.';

      simMetric.className = metricState(Boolean(simHealth));
      simMetric.textContent = simHealth
        ? `${simHealth.session?.status || 'unknown'} · ${simHealth.idleState?.humanPlayerCount ?? 0} human · ${simHealth.idleState?.aiPlayerCount ?? 0} AI`
        : 'Offline';
      simBody.textContent = snapshot.services.sim.statusText || 'No sim wrapper status available.';

      if (simHealth) {
        const idle = simHealth.idleState || {};
        sessionMetric.className = metricState(true);
        sessionMetric.textContent = `${simHealth.mapId || 'none'} · overload ${simHealth.session?.overloadState || 'unknown'}`;
        sessionBody.textContent = [
          `session: ${simHealth.session?.id || 'none'}`,
          `status: ${simHealth.session?.status || 'unknown'}`,
          `time scale: ${simHealth.session?.timeScale ?? 1}`,
          `players: ${simHealth.playerCount ?? 0}`,
          `idle: ${idle.isIdle ? 'yes' : 'no'}`,
          `shutdown in: ${idle.shutdownAt ? new Date(idle.shutdownAt).toLocaleTimeString() : 'n/a'}`,
          `reason: ${simHealth.shutdownReason || 'n/a'}`,
        ].join('\n');
      } else {
        sessionMetric.className = metricState(false);
        sessionMetric.textContent = 'No live session';
        sessionBody.textContent = 'The embedded sim is not healthy yet.';
      }

      rawBody.textContent = JSON.stringify(snapshot, null, 2);
    }

    async function tick() {
      try {
        const snapshot = await window.lbhStatus.getSnapshot();
        render(snapshot);
      } catch (err) {
        checkedAt.textContent = `Status read failed: ${err.message}`;
      }
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>

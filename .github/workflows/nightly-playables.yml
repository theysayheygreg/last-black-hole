name: Nightly Playables

on:
  schedule:
    - cron: '17 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: lbh-nightly-playables
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.changes.outputs.should_build }}
      last_success_sha: ${{ steps.changes.outputs.last_success_sha }}
    steps:
      - name: Decide whether nightly should build
        id: changes
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('should_build', 'true');
              core.setOutput('last_success_sha', 'manual');
              return;
            }

            const { owner, repo } = context.repo;
            const workflowId = 'nightly-playables.yml';
            const currentSha = context.sha;

            const response = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: workflowId,
              status: 'success',
              per_page: 10,
            });

            const priorRun = response.data.workflow_runs.find((run) => run.id !== context.runId);
            if (!priorRun) {
              core.info('No prior successful nightly run found; building.');
              core.setOutput('should_build', 'true');
              core.setOutput('last_success_sha', 'none');
              return;
            }

            core.setOutput('last_success_sha', priorRun.head_sha);
            if (priorRun.head_sha === currentSha) {
              core.info(`Current SHA ${currentSha} matches last successful nightly run; skipping build jobs.`);
              core.setOutput('should_build', 'false');
              return;
            }

            core.info(`Current SHA ${currentSha} differs from last successful nightly SHA ${priorRun.head_sha}; building.`);
            core.setOutput('should_build', 'true');

  build-web:
    needs: detect-changes
    if: needs.detect-changes.outputs.should_build == 'true'
    env:
      ENABLE_GITHUB_PAGES: ${{ vars.LBH_ENABLE_GITHUB_PAGES == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.meta.outputs.release_body }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build web
        run: npm run build:web

      - name: Package nightly assets
        run: node scripts/ci/package-nightly-assets.js

      - name: Upload GitHub Pages artifact
        if: env.ENABLE_GITHUB_PAGES == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/nightly/web

      - name: Zip web artifact
        run: |
          cd dist/nightly
          zip -rq last-singularity-web-nightly.zip web

      - name: Build release metadata
        id: meta
        run: |
          {
            echo 'release_body<<EOF'
            echo 'Nightly playable builds for Last Singularity.'
            echo ''
            if [ "$ENABLE_GITHUB_PAGES" = "true" ]; then
              WEB_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
              echo "- Web (GitHub Pages): ${WEB_URL}"
            fi
            echo '- Web zip: attached zip asset'
            echo '- Windows: attached zip asset'
            echo '- macOS: attached zip asset'
            echo ''
            echo 'These are automated nightly playtest artifacts.'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Upload web release asset
        uses: actions/upload-artifact@v4
        with:
          name: last-singularity-web-nightly
          path: dist/nightly/last-singularity-web-nightly.zip

  build-win:
    needs: detect-changes
    if: needs.detect-changes.outputs.should_build == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build Windows desktop
        run: npm run build -- --targets=win --mode=release

      - name: Package nightly assets
        run: node scripts/ci/package-nightly-assets.js

      - name: Zip Windows artifact
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/nightly/Last Singularity-win32-x64" -DestinationPath "dist/nightly/last-singularity-win-nightly.zip" -Force

      - name: Upload Windows release asset
        uses: actions/upload-artifact@v4
        with:
          name: last-singularity-win-nightly
          path: dist/nightly/last-singularity-win-nightly.zip

  build-mac:
    needs: detect-changes
    if: needs.detect-changes.outputs.should_build == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build macOS desktop
        run: npm run build -- --targets=mac --mode=release

      - name: Package nightly assets
        run: node scripts/ci/package-nightly-assets.js

      - name: Zip macOS app
        run: |
          cd dist/nightly
          ditto -c -k --sequesterRsrc --keepParent "Last Singularity.app" "last-singularity-mac-nightly.zip"

      - name: Upload macOS release asset
        uses: actions/upload-artifact@v4
        with:
          name: last-singularity-mac-nightly
          path: dist/nightly/last-singularity-mac-nightly.zip

  deploy-pages:
    if: needs.detect-changes.outputs.should_build == 'true' && vars.LBH_ENABLE_GITHUB_PAGES == 'true'
    needs: [detect-changes, build-web]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish-release:
    if: needs.detect-changes.outputs.should_build == 'true'
    needs: [detect-changes, build-web, build-win, build-mac]
    runs-on: ubuntu-latest
    steps:
      - name: Download web asset
        uses: actions/download-artifact@v4
        with:
          name: last-singularity-web-nightly
          path: release-assets

      - name: Download win asset
        uses: actions/download-artifact@v4
        with:
          name: last-singularity-win-nightly
          path: release-assets

      - name: Download mac asset
        uses: actions/download-artifact@v4
        with:
          name: last-singularity-mac-nightly
          path: release-assets

      - name: Publish nightly release
        uses: ncipollo/release-action@v1
        with:
          tag: nightly-latest
          name: Nightly Playables
          body: ${{ needs.build-web.outputs.release_body }}
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          prerelease: true
          artifactErrorsFailBuild: true
          artifacts: "release-assets/*.zip"

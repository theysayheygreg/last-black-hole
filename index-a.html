<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Last Singularity</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000033;
      cursor: crosshair;
    }
    #fluid-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    #overlay-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: auto;
    }
    /* HUD */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 10;
      pointer-events: none;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      user-select: none;
    }
    #hud .hud-panel {
      position: absolute;
      font-size: 14px;
      letter-spacing: 0.05em;
    }
    #hud-timer {
      top: 16px; left: 20px;
      color: rgba(150, 170, 200, 0.7);
      text-shadow: 0 0 8px rgba(150, 170, 200, 0.4);
    }
    #hud-portals {
      top: 16px; right: 20px;
      text-align: right;
      color: rgba(180, 120, 255, 0.8);
      text-shadow: 0 0 8px rgba(180, 120, 255, 0.4);
    }
    #hud-salvage {
      bottom: 20px; left: 20px;
      color: rgba(212, 168, 67, 0.8);
      text-shadow: 0 0 8px rgba(212, 168, 67, 0.4);
    }
    #hud-warnings {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .hud-warning {
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 0.15em;
      text-shadow: 0 0 12px currentColor;
      opacity: 0;
      animation: hud-warning-in 0.3s ease-out forwards;
    }
    .hud-warning.fading {
      animation: hud-warning-out 0.5s ease-in forwards;
    }
    @keyframes hud-warning-in {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes hud-warning-out {
      from { opacity: 1; transform: scale(1); }
      to { opacity: 0; transform: scale(1.02); }
    }
  </style>
</head>
<body>
  <canvas id="fluid-canvas"></canvas>
  <canvas id="overlay-canvas"></canvas>
  <div id="hud" style="display:none;">
    <div id="hud-timer" class="hud-panel">00:00</div>
    <div id="hud-portals" class="hud-panel">no exits</div>
    <div id="hud-salvage" class="hud-panel"></div>
    <div id="hud-warnings"></div>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>

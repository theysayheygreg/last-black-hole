<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Last Singularity</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000033;
      cursor: crosshair;
    }
    #fluid-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    #overlay-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: auto;
    }
    /* HUD — terminal aesthetic */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 10;
      pointer-events: none;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      user-select: none;
    }
    #hud .hud-panel {
      position: absolute;
      font-size: 13px;
      letter-spacing: 0.05em;
      padding: 8px 12px;
      background: rgba(0, 2, 12, 0.6);
      border: 1px solid rgba(80, 100, 140, 0.2);
      border-radius: 2px;
    }
    #hud-collapse {
      top: 12px; left: 16px;
      color: rgba(150, 170, 200, 0.8);
      text-shadow: 0 0 6px rgba(150, 170, 200, 0.3);
      line-height: 1.5;
      border-color: rgba(150, 170, 200, 0.15);
    }
    #hud-collapse .hud-label {
      font-size: 9px;
      letter-spacing: 0.15em;
      color: rgba(140, 160, 190, 0.65);
      text-transform: uppercase;
    }
    #hud-collapse .hud-value {
      font-size: 18px;
      font-weight: bold;
    }
    #hud-collapse .hud-sub {
      font-size: 10px;
      color: rgba(140, 160, 190, 0.65);
    }
    #hud-signal {
      top: 72px; left: 16px;
      color: rgba(80, 200, 180, 0.85);
      text-shadow: 0 0 6px rgba(80, 200, 180, 0.3);
      line-height: 1.4;
      border-color: rgba(80, 200, 180, 0.15);
    }
    #hud-signal .hud-label {
      font-size: 9px;
      letter-spacing: 0.15em;
      color: rgba(80, 180, 160, 0.65);
      text-transform: uppercase;
    }
    #hud-signal-bar {
      width: 120px; height: 4px;
      background: rgba(40, 50, 60, 0.6);
      border-radius: 2px;
      margin: 3px 0 2px 0;
      overflow: hidden;
    }
    #hud-signal-fill {
      height: 100%;
      width: 0%;
      border-radius: 2px;
      transition: width 0.15s, background-color 0.3s;
    }
    #hud-signal-zone {
      font-size: 10px;
      letter-spacing: 0.1em;
    }
    #hud-inhibitor {
      top: 128px; left: 16px;
      color: rgba(204, 26, 128, 0.9);
      text-shadow: 0 0 8px rgba(204, 26, 128, 0.5);
      line-height: 1.4;
      border-color: rgba(204, 26, 128, 0.2);
      animation: inhibitorPulse 2.4s ease-in-out infinite;
    }
    #hud-inhibitor .hud-label {
      font-size: 9px;
      letter-spacing: 0.15em;
      color: rgba(180, 60, 120, 0.7);
      text-transform: uppercase;
    }
    #hud-inhibitor-form {
      font-size: 13px;
      text-transform: lowercase;
      font-weight: 600;
    }
    #hud-inhibitor.form-vessel {
      color: rgba(255, 60, 140, 1.0);
      text-shadow: 0 0 12px rgba(255, 60, 140, 0.7);
      animation: inhibitorPulseVessel 1.4s ease-in-out infinite;
    }
    @keyframes inhibitorPulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1.0; }
    }
    @keyframes inhibitorPulseVessel {
      0%, 100% { opacity: 0.85; }
      50% { opacity: 1.0; }
    }
    #hud-portals {
      top: 12px; right: 16px;
      text-align: right;
      color: rgba(180, 120, 255, 0.85);
      text-shadow: 0 0 6px rgba(180, 120, 255, 0.3);
      line-height: 1.5;
      border-color: rgba(180, 120, 255, 0.15);
    }
    #hud-portals .hud-label {
      font-size: 9px;
      letter-spacing: 0.15em;
      color: rgba(160, 120, 220, 0.65);
      text-transform: uppercase;
    }
    #hud-portals .hud-value {
      font-size: 13px;
    }
    #hud-portals .hud-sub {
      font-size: 10px;
      color: rgba(160, 120, 220, 0.65);
    }
    #hud-salvage {
      bottom: 16px; left: 16px;
      color: rgba(212, 168, 67, 0.85);
      text-shadow: 0 0 6px rgba(212, 168, 67, 0.3);
      line-height: 1.5;
      border-color: rgba(212, 168, 67, 0.15);
    }
    #hud-salvage .hud-sub {
      font-size: 10px;
      color: rgba(190, 165, 90, 0.7);
    }
    #hud-scavengers {
      display: none;  /* hidden — scavenger count is better as organic discovery */
    }
    #hud-signature {
      bottom: 46px; left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: 10px;
      color: rgba(140, 170, 190, 0.5);
      text-shadow: 0 0 4px rgba(140, 170, 190, 0.2);
      background: none;
      border: none;
      padding: 0;
    }
    #hud-pulse {
      bottom: 62px; left: 16px;
      font-size: 10px;
      color: rgba(200, 180, 100, 0.7);
      text-shadow: 0 0 4px rgba(200, 180, 100, 0.2);
      background: none;
      border: none;
      padding: 2px 0;
    }
    #hud-pulse.ready {
      color: rgba(100, 220, 160, 0.8);
      text-shadow: 0 0 6px rgba(100, 220, 160, 0.3);
    }
    #hud-abilities {
      bottom: 80px; left: 16px;
      font-size: 9px;
      background: none;
      border: none;
      padding: 0;
      line-height: 1.6;
    }
    .hud-ability {
      color: rgba(160, 170, 180, 0.6);
    }
    .hud-ability-key {
      color: rgba(120, 140, 160, 0.5);
      font-weight: bold;
    }
    .hud-ability.active .hud-ability-name {
      color: rgba(100, 255, 200, 0.9);
      text-shadow: 0 0 6px rgba(100, 255, 200, 0.3);
    }
    .hud-ability.cooldown .hud-ability-status {
      color: rgba(200, 160, 80, 0.6);
    }
    .hud-ability.ready .hud-ability-name {
      color: rgba(180, 200, 220, 0.8);
    }
    #hud-portal-arrow {
      position: absolute;
      bottom: 50%;
      left: 50%;
      width: 0; height: 0;
      pointer-events: none;
    }
    /* Events log — left side, stacks entries, fades by age (like MMO chat) */
    #hud-warnings {
      position: absolute;
      bottom: 90px;
      left: 16px;
      width: 280px;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 3px;
      pointer-events: none;
    }
    .hud-warning {
      font-size: 11px;
      font-weight: normal;
      letter-spacing: 0.03em;
      text-shadow: 0 0 6px rgba(0, 0, 0, 0.8);
      opacity: 0;
      padding: 2px 0;
      animation: hud-warning-in 0.2s ease-out forwards;
    }
    .hud-warning.fading {
      animation: hud-warning-out 1.0s ease-in forwards;
    }
    @keyframes hud-warning-in {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes hud-warning-out {
      from { opacity: 1; }
      to { opacity: 0; }
    }
    /* Inventory panel (Tab toggle) — terminal card */
    #hud-inventory-panel {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0, 2, 12, 0.92);
      border: 1px solid rgba(80, 100, 140, 0.3);
      border-radius: 2px;
      padding: 10px 14px;
      min-width: 260px;
      max-width: 320px;
      font-size: 11px;
      color: rgba(180, 190, 210, 0.9);
      line-height: 1.6;
      display: none;
      pointer-events: auto;
      box-shadow: 0 0 20px rgba(0, 0, 30, 0.8), inset 0 0 30px rgba(0, 0, 20, 0.3);
    }
    #hud-inventory-panel.open { display: block; }
    #hud-inventory-panel .inv-header {
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(130, 150, 185, 0.65);
      border-bottom: 1px solid rgba(80, 100, 140, 0.15);
      padding-bottom: 4px;
      margin-bottom: 6px;
    }
    #hud-inventory-panel .inv-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 4px;
      margin: 1px 0;
      border-radius: 1px;
      transition: background 0.1s;
    }
    #hud-inventory-panel .inv-item:hover {
      background: rgba(80, 100, 160, 0.12);
    }
    #hud-inventory-panel .inv-item .inv-name {
      flex: 1;
      font-size: 11px;
    }
    #hud-inventory-panel .inv-item .inv-cat {
      font-size: 9px;
      margin-left: 8px;
      opacity: 0.45;
      letter-spacing: 0.05em;
    }
    #hud-inventory-panel .inv-item .inv-drop {
      margin-left: 8px;
      color: rgba(255, 100, 80, 0.6);
      font-size: 9px;
      letter-spacing: 0.05em;
    }
    #hud-inventory-panel .inv-empty {
      color: rgba(110, 120, 140, 0.5);
      font-size: 10px;
    }
    #hud-inventory-panel .inv-section {
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid rgba(80, 100, 140, 0.12);
    }
  </style>
</head>
<body>
  <canvas id="fluid-canvas"></canvas>
  <canvas id="overlay-canvas"></canvas>
  <div id="hud" style="display:none;">
    <div id="hud-collapse" class="hud-panel">
      <div class="hud-label">universal collapse</div>
      <div class="hud-value" id="hud-collapse-timer">10:00</div>
      <div class="hud-sub" id="hud-collapse-event"></div>
    </div>
    <div id="hud-signal" class="hud-panel">
      <div class="hud-label">signal</div>
      <div id="hud-signal-bar"><div id="hud-signal-fill"></div></div>
      <div id="hud-signal-zone">ghost</div>
    </div>
    <div id="hud-inhibitor" class="hud-panel" style="display: none;">
      <div class="hud-label">inhibitor</div>
      <div id="hud-inhibitor-form">dormant</div>
    </div>
    <div id="hud-portals" class="hud-panel">
      <div class="hud-label">wormholes</div>
      <div class="hud-value" id="hud-portals-status">no active wormholes</div>
      <div class="hud-sub" id="hud-portals-next"></div>
    </div>
    <div id="hud-salvage" class="hud-panel">
      <div id="hud-salvage-count"></div>
      <div class="hud-sub" id="hud-salvage-value"></div>
    </div>
    <div id="hud-scavengers" class="hud-panel">
      <div id="hud-scavengers-count"></div>
      <div class="hud-sub" id="hud-scavengers-sub"></div>
    </div>
    <div id="hud-pulse" class="hud-panel"></div>
    <div id="hud-abilities" class="hud-panel">
      <div id="hud-ability1" class="hud-ability"><span class="hud-ability-key">Q</span> <span class="hud-ability-name">---</span> <span class="hud-ability-status"></span></div>
      <div id="hud-ability2" class="hud-ability"><span class="hud-ability-key">R</span> <span class="hud-ability-name">---</span> <span class="hud-ability-status"></span></div>
    </div>
    <div id="hud-signature" class="hud-panel"></div>
    <div id="hud-portal-arrow"></div>
    <div id="hud-inventory-panel"></div>
    <div id="hud-warnings"></div>
  </div>
  <script src="src/build-flags.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>

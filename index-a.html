<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Last Singularity</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000033;
      cursor: crosshair;
    }
    #fluid-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    #overlay-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: auto;
    }
    /* HUD */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 10;
      pointer-events: none;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      user-select: none;
    }
    #hud .hud-panel {
      position: absolute;
      font-size: 14px;
      letter-spacing: 0.05em;
    }
    #hud-collapse {
      top: 14px; left: 20px;
      color: rgba(150, 170, 200, 0.7);
      text-shadow: 0 0 8px rgba(150, 170, 200, 0.4);
      line-height: 1.5;
    }
    #hud-collapse .hud-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      color: rgba(120, 140, 170, 0.5);
    }
    #hud-collapse .hud-value {
      font-size: 16px;
    }
    #hud-collapse .hud-sub {
      font-size: 11px;
      color: rgba(130, 150, 180, 0.6);
    }
    #hud-portals {
      top: 14px; right: 20px;
      text-align: right;
      color: rgba(180, 120, 255, 0.8);
      text-shadow: 0 0 8px rgba(180, 120, 255, 0.4);
      line-height: 1.5;
    }
    #hud-portals .hud-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      color: rgba(140, 100, 200, 0.5);
    }
    #hud-portals .hud-value {
      font-size: 14px;
    }
    #hud-portals .hud-sub {
      font-size: 11px;
      color: rgba(150, 110, 210, 0.6);
    }
    #hud-salvage {
      bottom: 20px; left: 20px;
      color: rgba(212, 168, 67, 0.8);
      text-shadow: 0 0 8px rgba(212, 168, 67, 0.4);
      line-height: 1.5;
    }
    #hud-salvage .hud-sub {
      font-size: 11px;
      color: rgba(180, 150, 80, 0.6);
    }
    #hud-scavengers {
      bottom: 20px; right: 20px;
      text-align: right;
      color: rgba(138, 174, 196, 0.8);
      text-shadow: 0 0 8px rgba(138, 174, 196, 0.3);
      line-height: 1.5;
    }
    #hud-scavengers .hud-sub {
      font-size: 11px;
      color: rgba(120, 150, 170, 0.5);
    }
    #hud-signature {
      bottom: 50px; left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: 11px;
      color: rgba(120, 150, 170, 0.4);
      text-shadow: 0 0 6px rgba(120, 150, 170, 0.2);
    }
    #hud-pulse {
      bottom: 48px; left: 20px;
      font-size: 11px;
      color: rgba(200, 180, 100, 0.7);
      text-shadow: 0 0 6px rgba(200, 180, 100, 0.3);
    }
    #hud-pulse.ready {
      color: rgba(100, 220, 160, 0.8);
      text-shadow: 0 0 8px rgba(100, 220, 160, 0.4);
    }
    #hud-portal-arrow {
      position: absolute;
      bottom: 50%;
      left: 50%;
      width: 0; height: 0;
      pointer-events: none;
    }
    #hud-warnings {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .hud-warning {
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 0.15em;
      text-shadow: 0 0 12px currentColor;
      opacity: 0;
      animation: hud-warning-in 0.3s ease-out forwards;
    }
    .hud-warning.fading {
      animation: hud-warning-out 0.5s ease-in forwards;
    }
    @keyframes hud-warning-in {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes hud-warning-out {
      from { opacity: 1; transform: scale(1); }
      to { opacity: 0; transform: scale(1.02); }
    }
  </style>
</head>
<body>
  <canvas id="fluid-canvas"></canvas>
  <canvas id="overlay-canvas"></canvas>
  <div id="hud" style="display:none;">
    <div id="hud-collapse" class="hud-panel">
      <div class="hud-label">universal collapse</div>
      <div class="hud-value" id="hud-collapse-timer">10:00</div>
      <div class="hud-sub" id="hud-collapse-event"></div>
    </div>
    <div id="hud-portals" class="hud-panel">
      <div class="hud-label">wormholes</div>
      <div class="hud-value" id="hud-portals-status">no active wormholes</div>
      <div class="hud-sub" id="hud-portals-next"></div>
    </div>
    <div id="hud-salvage" class="hud-panel">
      <div id="hud-salvage-count"></div>
      <div class="hud-sub" id="hud-salvage-value"></div>
    </div>
    <div id="hud-scavengers" class="hud-panel">
      <div id="hud-scavengers-count"></div>
      <div class="hud-sub" id="hud-scavengers-sub"></div>
    </div>
    <div id="hud-pulse" class="hud-panel"></div>
    <div id="hud-signature" class="hud-panel"></div>
    <div id="hud-portal-arrow"></div>
    <div id="hud-warnings"></div>
  </div>
  <script src="src/build-flags.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>

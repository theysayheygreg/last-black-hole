<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LBH — Title Prototype</title>
  <link rel="icon" href="data:," />
  <style>
    :root {
      --accretion-gold: #FFD966;
      --inhibitor-magenta: #CC1A80;
      --void: #000021;
      --hud-panel-bg: rgba(0, 2, 12, 0.6);
      --hud-border: rgba(80, 100, 140, 0.2);
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--void);
      color: #dfe3ec;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      overflow: hidden;
    }

    #render-canvas,
    #overlay-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      position: absolute;
      inset: 0;
    }

    #render-canvas { z-index: 0; }
    #overlay-canvas { z-index: 1; pointer-events: none; }

    #title-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      animation: fadeIn 1.8s ease-out 0.2s forwards;
    }

    @keyframes fadeIn { to { opacity: 1; } }

    #title-line {
      font-size: 44px;
      font-weight: 400;
      letter-spacing: 0.45em;
      color: rgba(240, 244, 252, 0.9);
      text-shadow: 0 0 18px rgba(255, 217, 102, 0.15),
                   0 0 6px rgba(240, 244, 252, 0.4);
      margin-bottom: 8px;
    }

    #title-cursor {
      display: inline-block;
      margin-left: 4px;
      animation: blink 1.1s step-end infinite;
      color: rgba(240, 244, 252, 0.9);
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      50.01%, 100% { opacity: 0; }
    }

    #subtitle {
      font-size: 12px;
      letter-spacing: 0.22em;
      color: rgba(180, 185, 200, 0.6);
      text-transform: uppercase;
      margin-top: 32px;
    }

    #tuning-panel {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 3;
      background: var(--hud-panel-bg);
      border: 1px solid var(--hud-border);
      border-radius: 2px;
      padding: 10px 14px;
      font-size: 10px;
      color: rgba(200, 210, 230, 0.8);
      letter-spacing: 0.1em;
      max-width: 320px;
    }

    #tuning-panel .row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin: 3px 0;
    }

    #tuning-panel .label {
      color: rgba(150, 160, 180, 0.65);
      text-transform: uppercase;
    }

    #tuning-panel .value {
      color: var(--accretion-gold);
    }

    #tuning-panel .hint {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid var(--hud-border);
      color: rgba(130, 140, 160, 0.55);
    }
  </style>
</head>
<body>
  <canvas id="render-canvas"></canvas>
  <canvas id="overlay-canvas"></canvas>

  <div id="title-overlay">
    <div id="title-line">LAST BLACK HOLE<span id="title-cursor">_</span></div>
    <div id="subtitle">title prototype — render pipeline v1 (parity)</div>
  </div>

  <div id="tuning-panel">
    <div class="row"><span class="label">fps</span><span class="value" id="fps-text">—</span></div>
    <div class="hint">[r] reset sim • [space] fade title</div>
  </div>

  <script type="module" src="/src/render/title-prototype.js"></script>
</body>
</html>
